apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: k8s-lab
      namespace: gateway-system
  hostnames:
    - grafana.k8s.local
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
