apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  parentRefs:
    - name: k8s-lab
      namespace: gateway-system
  hostnames:
    - prometheus.k8s.local
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
